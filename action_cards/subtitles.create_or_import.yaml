id: "subtitles.create_or_import"
name: "Create or import subtitles"
domain: "subtitles"
resolve_page: "Edit"
risk_level: "medium"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "partial"
  required_api_objects: []
  required_api_methods: []
  ui_required: false
  human_visual_review_required: true
risk:
  base_risk: "medium"
  escalators:
    - condition: "replaces_existing_subtitle_tracks"
      raises_to: "high"
      requires_confirmation: true
    - condition: "burns_subtitles_into_final_render"
      raises_to: "high"
      requires_confirmation: true
    - condition: "api_unconfirmed"
      force_mode: "instruction_or_pseudocode"
confirmation:
  required_before:
    - "replacing_existing_subtitle_tracks"
    - "burning_subtitles_into_final_render"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "import SRT"
  - "create subtitles"
  - "add captions"
  - "导入字幕"
required_inputs:
  - timeline_name
  - subtitle_source_or_text
optional_inputs:
  - language
  - subtitle_track_name
  - burn_in_or_embedded
  - export_format
preflight_checks:
  - "Confirm target timeline and subtitle source."
  - "Confirm whether subtitles should be burned in, embedded, or exported separately."
  - "Confirm version support for requested subtitle behavior."
execution_modes:
  scripting_api:
    status: "use_only_when_api_confirmed"
    notes: "Do not invent subtitle API methods."
  ui_guidance:
    status: "available"
    notes: "Guide UI import or manual creation."
  hybrid:
    status: "recommended"
    notes: "Prepare subtitle file, then user imports or confirms timing visually."
safety:
  confirmation_required_before:
    - "replacing_existing_subtitle_tracks"
    - "burning_subtitles_into_final_render"
  never_do:
    - "modify_or_overwrite_source_subtitle_or_media_files_without_confirmation"
generic_steps:
  - "Validate subtitle source format."
  - "Place subtitles on target timeline."
  - "Confirm timing, language, and render behavior."
verification:
  - "Subtitle track exists and timing aligns with dialogue."
  - "Render/export behavior matches requested subtitle mode."
  - "Source files remain unchanged unless the user explicitly confirmed file modification."
rollback:
  - "Remove or disable added subtitle track after confirmation."
