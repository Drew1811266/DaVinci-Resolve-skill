id: "color.apply_lut"
name: "Apply LUT"
domain: "color_grading"
resolve_page: "Color"
risk_level: "high"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "bmd-training-resolve-20"
    evidence_type: "workflow_reference"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "partial"
  required_api_objects: []
  required_api_methods: []
  ui_required: true
  human_visual_review_required: true
risk:
  base_risk: "medium"
  escalators:
    - condition: "applies_lut_to_many_clips"
      raises_to: "high"
      requires_confirmation: true
    - condition: "changes_color_management"
      raises_to: "high"
      requires_confirmation: true
    - condition: "subjective_visual_judgment"
      force_mode: "hybrid"
    - condition: "api_unconfirmed"
      force_mode: "instruction_or_pseudocode"
confirmation:
  required_before:
    - "applying_lut_to_many_clips"
    - "changing_color_management"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "apply LUT"
  - "add film look"
  - "套 LUT"
required_inputs:
  - timeline_or_clip_scope
  - lut_name_or_path
optional_inputs:
  - color_space
  - node_position
  - strength
  - reference_stills
preflight_checks:
  - "Confirm LUT path and color space."
  - "Confirm clip scope or timeline scope."
  - "Recommend duplicating timeline or preserving stills before broad changes."
execution_modes:
  hybrid:
    status: "recommended"
    notes: "Applying looks requires visual review."
  ui_guidance:
    status: "available"
    notes: "Guide through Color page with user confirmation."
  scripting_api:
    status: "use_only_when_api_confirmed"
    notes: "Do not invent Color page node API methods."
safety:
  confirmation_required_before:
    - "applying_lut_to_many_clips"
    - "changing_color_management"
generic_steps:
  - "Confirm color pipeline and LUT intent."
  - "Apply to a test clip or duplicated timeline first."
  - "Ask user to visually approve before broad application."
verification:
  - "LUT is visible on intended clips only."
  - "Image is not clipped or transformed in the wrong color space."
rollback:
  - "Disable or remove LUT node, or return to duplicated timeline."
