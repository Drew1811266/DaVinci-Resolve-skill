id: "render.batch_export"
name: "Batch export timelines"
domain: "delivery_rendering"
resolve_page: "Deliver"
risk_level: "high"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "confirmed"
  required_api_objects: ["Project"]
  required_api_methods: ["SetRenderSettings", "AddRenderJob", "StartRendering", "GetRenderJobList"]
  ui_required: false
  human_visual_review_required: false
risk:
  base_risk: "medium"
  escalators:
    - condition: "batch_scope"
      raises_to: "high"
      requires_dry_run: true
    - condition: "overwrites_existing_files"
      raises_to: "high"
      requires_confirmation: true
    - condition: "starts_batch_render"
      raises_to: "high"
      requires_confirmation: true
    - condition: "render_setting_key_unclear"
      force_mode: "instruction_or_pseudocode"
confirmation:
  required_before:
    - "starting_batch_render"
    - "overwriting_existing_outputs"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "batch export"
  - "render all timelines"
  - "批量导出"
required_inputs:
  - timeline_list
  - output_directory
  - naming_pattern
  - format
  - codec
optional_inputs:
  - render_preset
  - subtitle_mode
  - dry_run
preflight_checks:
  - "Confirm all target timelines."
  - "Confirm output naming and collision behavior."
  - "Confirm render duration and machine usage."
execution_modes:
  scripting_api:
    status: "preferred_when_api_confirmed"
    notes: "Use dry run first; confirm batch render API."
  hybrid:
    status: "recommended"
    notes: "Script queue setup, user confirms before starting render."
  ui_guidance:
    status: "available"
    notes: "Use when scripting is unverified."
safety:
  confirmation_required_before:
    - "starting_batch_render"
    - "overwriting_existing_outputs"
generic_steps:
  - "Dry-run timeline list and output paths."
  - "Ask for confirmation if any output exists."
  - "Add jobs to render queue."
  - "Start rendering only after confirmation."
verification:
  - "Every requested timeline has one queued or rendered output."
  - "Each output exists and matches expected settings."
rollback:
  - "Remove queued jobs."
  - "Delete incorrect outputs only after confirmation."
