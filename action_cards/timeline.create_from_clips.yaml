id: "timeline.create_from_clips"
name: "Create timeline from clips"
domain: "editing"
resolve_page: "Edit"
risk_level: "medium"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "confirmed"
  required_api_objects: ["Project", "MediaPool"]
  required_api_methods: ["GetMediaPool", "CreateTimelineFromClips", "CreateEmptyTimeline", "AppendToTimeline"]
  ui_required: false
  human_visual_review_required: true
risk:
  base_risk: "medium"
  escalators:
    - condition: "changes_timeline_frame_rate"
      raises_to: "high"
      requires_confirmation: true
    - condition: "replaces_existing_timeline"
      raises_to: "high"
      requires_confirmation: true
    - condition: "batch_scope"
      raises_to: "high"
      requires_dry_run: true
    - condition: "creative_edit_order_unclear"
      force_mode: "hybrid"
confirmation:
  required_before:
    - "changing_timeline_frame_rate"
    - "replacing_existing_timeline"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "create timeline"
  - "make timeline from clips"
  - "用素材创建时间线"
required_inputs:
  - target_project
  - clip_selection
  - timeline_name
optional_inputs:
  - sort_order
  - timeline_resolution
  - timeline_frame_rate
  - start_timecode
preflight_checks:
  - "Confirm correct project and Media Pool selection."
  - "Confirm clip ordering."
  - "Confirm frame rate before timeline creation; changing later may be unsafe."
execution_modes:
  scripting_api:
    status: "preferred_when_api_confirmed"
    notes: "Confirm timeline creation API and frame-rate behavior."
  ui_guidance:
    status: "available"
    notes: "Guide user through Media Pool or Edit page timeline creation."
  hybrid:
    status: "recommended"
    notes: "Script structure, then user reviews edit order."
safety:
  confirmation_required_before:
    - "changing_timeline_frame_rate"
    - "replacing_existing_timeline"
generic_steps:
  - "Resolve clip list and order."
  - "Check timeline name conflict."
  - "Create timeline with confirmed settings."
  - "Set active timeline if requested."
verification:
  - "Timeline exists with expected name."
  - "Clip count, order, duration, frame rate, and resolution match request."
rollback:
  - "Delete incorrect timeline only after confirmation."
