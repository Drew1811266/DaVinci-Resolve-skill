id: "project.backup_project"
name: "Back up project before risky work"
domain: "project_management"
resolve_page: "Project Manager"
risk_level: "low"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "confirmed"
  required_api_objects: ["Resolve", "ProjectManager"]
  required_api_methods: ["GetProjectManager", "ArchiveProject", "ExportProject"]
  ui_required: false
  human_visual_review_required: false
risk:
  base_risk: "low"
  escalators:
    - condition: "overwrites_existing_backup"
      raises_to: "high"
      requires_confirmation: true
    - condition: "excludes_media_from_expected_archive"
      raises_to: "medium"
      requires_confirmation: true
    - condition: "archive_includes_large_media_tree"
      raises_to: "medium"
      requires_dry_run: true
confirmation:
  required_before:
    - "overwriting_existing_backup"
    - "excluding_media_from_archive"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "backup project"
  - "archive project"
  - "make a copy before changes"
  - "备份项目"
required_inputs:
  - project_name
optional_inputs:
  - backup_destination
  - include_media
  - include_cache
  - archive_format
preflight_checks:
  - "Confirm the correct project is open."
  - "Confirm whether the user wants a project-only backup or full archive with media."
  - "Confirm backup destination and free disk space if media is included."
execution_modes:
  ui_guidance:
    status: "available"
    notes: "Use when backup or archive menus must be selected by the user."
  scripting_api:
    status: "use_only_when_api_confirmed"
    notes: "Confirm backup/export/archive API in installed Developer documentation."
  hybrid:
    status: "available"
    notes: "Use script to inspect project state, then user confirms backup in UI."
safety:
  confirmation_required_before:
    - "overwriting_existing_backup"
    - "excluding_media_from_archive"
  never_do:
    - "delete_existing_backups_without_confirmation"
generic_steps:
  - "Identify active project."
  - "Choose backup or archive scope."
  - "Validate destination and overwrite risk."
  - "Create backup or guide user through export/archive."
verification:
  - "Backup or archive file exists at expected destination."
  - "File timestamp matches the operation."
  - "Backup can be opened or restored according to the selected method."
rollback:
  - "Use the backup/archive to restore project state if later changes are incorrect."
