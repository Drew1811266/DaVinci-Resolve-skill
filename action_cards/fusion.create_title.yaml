id: "fusion.create_title"
name: "Create Fusion title"
domain: "visual_effects"
resolve_page: "Fusion"
risk_level: "medium"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "bmd-training-resolve-20"
    evidence_type: "workflow_reference"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "partial"
  required_api_objects: []
  required_api_methods: []
  ui_required: true
  human_visual_review_required: true
risk:
  base_risk: "medium"
  escalators:
    - condition: "replaces_existing_title_or_comp"
      raises_to: "high"
      requires_confirmation: true
    - condition: "subjective_visual_judgment"
      force_mode: "hybrid"
    - condition: "api_unconfirmed"
      force_mode: "instruction_or_pseudocode"
confirmation:
  required_before:
    - "replacing_existing_title_or_comp"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "create title"
  - "Fusion title"
  - "做标题动画"
required_inputs:
  - timeline_name
  - title_text
optional_inputs:
  - duration
  - style_reference
  - font
  - animation_notes
preflight_checks:
  - "Confirm target timeline and insertion point."
  - "Confirm visual style and duration."
  - "Confirm whether generated design needs manual review."
execution_modes:
  hybrid:
    status: "recommended"
    notes: "Create structure, then user reviews animation and design."
  ui_guidance:
    status: "available"
    notes: "Guide user through Fusion or title tools."
  scripting_api:
    status: "use_only_when_api_confirmed"
    notes: "Confirm Fusion composition API before generating code."
safety:
  confirmation_required_before:
    - "replacing_existing_title_or_comp"
generic_steps:
  - "Choose insertion point and title duration."
  - "Create title or Fusion composition."
  - "Set text and basic styling."
  - "Ask user to visually approve motion and layout."
verification:
  - "Title appears at expected time with expected text."
  - "Animation and styling match user-approved direction."
rollback:
  - "Disable or remove created title after confirmation."
