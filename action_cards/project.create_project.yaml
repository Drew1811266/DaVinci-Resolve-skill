id: "project.create_project"
name: "Create project"
domain: "project_management"
resolve_page: "Project Manager"
risk_level: "medium"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "confirmed"
  required_api_objects: ["Resolve", "ProjectManager"]
  required_api_methods: ["GetProjectManager", "CreateProject"]
  ui_required: false
  human_visual_review_required: false
risk:
  base_risk: "medium"
  escalators:
    - condition: "existing_project_name_conflict"
      raises_to: "high"
      requires_confirmation: true
    - condition: "changes_default_project_settings"
      raises_to: "high"
      requires_confirmation: true
    - condition: "collaborative_or_cloud_project"
      raises_to: "high"
      requires_confirmation: true
confirmation:
  required_before:
    - "overwriting_or_replacing_existing_project"
    - "changing_default_project_settings"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "create project"
  - "new Resolve project"
  - "创建项目"
required_inputs:
  - project_name
optional_inputs:
  - project_library
  - project_settings
  - backup_location
preflight_checks:
  - "Confirm project name and project library."
  - "Check whether a project with the same name already exists."
  - "Confirm initial frame rate, resolution, and color management if requested."
execution_modes:
  scripting_api:
    status: "preferred_when_api_confirmed"
    notes: "Confirm project creation API in installed Developer documentation."
  ui_guidance:
    status: "available"
    notes: "Guide user through Project Manager."
  hybrid:
    status: "available"
    notes: "Create project, then user confirms project settings visually."
safety:
  confirmation_required_before:
    - "overwriting_or_replacing_existing_project"
    - "changing_default_project_settings"
generic_steps:
  - "Check for existing project name conflict."
  - "Create or guide creation of the project."
  - "Apply only confirmed initial settings."
verification:
  - "New project opens with expected name."
  - "Project settings match requested values."
rollback:
  - "Close or delete the new project only after confirmation."
