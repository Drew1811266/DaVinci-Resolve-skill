id: "media.import_folder"
name: "Import folder into Media Pool"
domain: "media_management"
resolve_page: "Media"
risk_level: "medium"
applies_to:
  resolve_versions: ["20.x", "21.x", "user_installed_version"]
  editions: ["free", "studio"]
  operating_systems: ["macOS", "Windows", "Linux"]
source_refs:
  - source_id: "bmd-product-overview-21"
    evidence_type: "feature_overview"
    last_verified: "2026-05-31"
  - source_id: "installed-developer-docs-user"
    evidence_type: "api_to_verify"
    last_verified: "user_to_fill"
automation:
  scriptability: "confirmed"
  required_api_objects: ["Project", "MediaPool"]
  required_api_methods: ["GetMediaPool", "ImportMedia"]
  ui_required: false
  human_visual_review_required: false
risk:
  base_risk: "low"
  escalators:
    - condition: "recursive_large_folder_import"
      raises_to: "medium"
      requires_dry_run: true
    - condition: "generates_proxy_or_optimized_media"
      raises_to: "medium"
      requires_confirmation: true
    - condition: "moves_or_deletes_source_media"
      raises_to: "high"
      requires_confirmation: true
    - condition: "image_sequence_or_proxy_behavior_unclear"
      force_mode: "hybrid"
confirmation:
  required_before:
    - "moving_or_deleting_source_media"
    - "transcoding_or_generating_optimized_media"
  cannot_be_bypassed_by: ["do not ask", "just overwrite", "skip backup", "别问了", "直接覆盖", "不用备份"]
user_intents:
  - "import folder"
  - "import media"
  - "add footage"
  - "导入素材"
  - "导入文件夹"
required_inputs:
  - source_folder
  - target_project
optional_inputs:
  - target_bin
  - recursive_import
  - sort_order
preflight_checks:
  - "Confirm Resolve is open and the correct project is active."
  - "Confirm the source folder exists and should only be read, not moved."
  - "Confirm target bin or default Media Pool location."
execution_modes:
  scripting_api:
    status: "preferred_when_api_confirmed"
    notes: "Confirm import API behavior in installed Developer documentation."
  ui_guidance:
    status: "available"
    notes: "Use Media page import guidance when scripting is unavailable."
  hybrid:
    status: "available"
    notes: "Script import, then ask user to verify clip metadata visually."
safety:
  confirmation_required_before:
    - "moving_or_deleting_source_media"
    - "transcoding_or_generating_optimized_media"
  never_do:
    - "overwrite_source_camera_media"
generic_steps:
  - "Identify active project and target bin."
  - "Validate source folder path."
  - "Import supported media without moving source files."
  - "Report imported, skipped, and failed items."
verification:
  - "Clips appear in the target Media Pool bin."
  - "Source files remain unchanged in their original folder."
rollback:
  - "Remove incorrectly imported clips from Media Pool only after confirmation."
